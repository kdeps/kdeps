name: Build and Test

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Read golangci-lint version
        id: lint-version
        run: echo "version=$(cat .golangci-lint-version)" >> "$GITHUB_OUTPUT"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.lint-version.outputs.version }}
          args: --timeout=10m --config=.golangci.yml
          only-new-issues: false
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          output=$(govulncheck ./... 2>&1); exit_code=$?
          echo "$output"
          if [ $exit_code -ne 0 ]; then
            # GO-2026-4887: docker/docker AuthZ bypass - daemon-side only, no fix available (v28.5.2 is latest)
            new_vulns=$(echo "$output" | grep "^Vulnerability #" | grep -v "GO-2026-4887" || true)
            if [ -n "$new_vulns" ]; then exit 1; fi
          fi

  test:
    runs-on: ubuntu-latest
    env:
      UV_NO_CACHE: 1
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama --version

    # We need golangci-lint installed because 'make test-unit' depends on 'lint'
    - name: Install golangci-lint
      run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin $(cat .golangci-lint-version)

    - name: Build
      run: make build

    - name: Start Ollama
      run: |
        ollama serve &
        sleep 5
        ollama pull tinydolphin

    - name: Test Unit
      run: make test-unit
      timeout-minutes: 15

    - name: Test Integration
      run: make test-integration
      timeout-minutes: 15

    - name: Test E2E
      run: make test-e2e
      timeout-minutes: 15
