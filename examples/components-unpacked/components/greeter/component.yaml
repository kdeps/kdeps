apiVersion: kdeps.io/v1
kind: Component
metadata:
  name: greeter
  description: Greeting component (unpacked)
  version: "1.0.0"
resources:
  - apiVersion: kdeps.io/v1
    kind: Resource
    metadata:
      actionId: sayHello
      name: Greet Resource
    run:
      expr:
        - set('greeting', 'Hello from unpacked component!')
