apiVersion: kdeps.io/v1
kind: Resource
metadata:
  actionId: search
run:
  validations:
    methods: [POST]
    routes: [/search]
    check:
      - get('query') != ''
    error:
      code: 400
      message: "query is required"
  searchLocal:
    path: "{{ get('path', '/data') }}"
    query: "{{ get('query') }}"
    glob: "{{ get('glob', '') }}"
    limit: 20
