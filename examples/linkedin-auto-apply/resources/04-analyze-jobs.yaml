apiVersion: kdeps.io/v1
kind: Resource

metadata:
  actionId: analyze-jobs
  name: analyze-jobs
  description: |
    Score each extracted job card against the candidate profile and return
    only jobs that meet the minimum match score threshold.

    Uses items iteration so each job card is scored individually.
    The LLM returns the original job object enriched with match_score,
    match_reasons, gaps, and a short cover_letter.
  requires: [search-jobs]

items:
  - "{{ get('search-jobs')['actionResults'][0]['result'] | default('[]') }}"

run:
  chat:
    backend: ollama
    model: llama3.2
    role: user
    prompt: |
      You are a job-fit analyst and cover letter writer.

      Score the job below 0-100 against the candidate profile. If the score
      is below {{ get('min_match_score') | default(60) }}, return null.
      Otherwise return the complete job object with these extra fields added:
        "match_score"   integer 0-100
        "match_reasons" array of strings (2-3 reasons the candidate fits)
        "gaps"          array of strings (skill/experience gaps)
        "cover_letter"  string (max 200 words, personalised, no placeholders)

      Candidate: {{ get('candidate_name') }}
      Profile:   {{ get('candidate_profile') }}

      Job: {{ item | toJSON() }}

      Rules:
      - Return ONLY valid JSON or the single word null - no prose, no fences.
      - Copy ALL original fields unchanged.
      - cover_letter: open with company + role, highlight 2-3 matching skills,
        close with a call to action, sign off with candidate full name.
    jsonResponse: true
    timeoutDuration: 90s
    scenario:
      - role: assistant
        prompt: >-
          You are a precise job-fit analyst. Return only valid JSON enriched
          with match_score, match_reasons, gaps, cover_letter — or null if
          the score is below threshold.
