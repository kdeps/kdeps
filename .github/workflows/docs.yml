name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/v1/**'
      - 'docs/v2/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            docs/v1/package-lock.json
            docs/v2/package-lock.json

      - name: Install D2
        run: |
          curl -fsSL -o /tmp/d2.tar.gz https://github.com/terrastruct/d2/releases/download/v0.7.1/d2-v0.7.1-linux-amd64.tar.gz
          tar -xzf /tmp/d2.tar.gz -C /tmp
          sudo install /tmp/d2-v0.7.1/bin/d2 /usr/local/bin/d2
          d2 --version

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Install dependencies (v1)
        run: npm ci
        working-directory: docs/v1

      - name: Build v1
        run: npm run build
        working-directory: docs/v1

      - name: Install dependencies (v2)
        run: npm ci
        working-directory: docs/v2

      - name: Build v2
        run: npm run build
        working-directory: docs/v2

      - name: Move v1 to dist
        run: |
          mkdir -p docs/v2/.vitepress/dist/v1
          cp -rp docs/v1/.vitepress/dist/. docs/v2/.vitepress/dist/v1/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/v2/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
