apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: hybrid-expressions-demo
  description: Demonstrates hybrid expressions mixing get() functions with operators
  version: "1.0.0"
  targetActionId: response

settings:
  apiServerMode: true
  hostIp: "0.0.0.0"
  portNum: 16395

  apiServer:
    routes:
      - path: /api/demo
        methods: [GET, POST]
    cors:
      enableCors: true
      allowOrigins:
        - "*"

  agentSettings:
    timezone: Etc/UTC

resources:
  - apiVersion: kdeps.io/v1
    kind: Resource
    metadata:
      actionId: setup
      name: Setup Values
    run:
      expr:
        - set('value', 21)
        - set('multiplier', 2)
        - set('base_price', 50)
        - set('quantity', 3)
        - set('score', 85)

  - apiVersion: kdeps.io/v1
    kind: Resource
    metadata:
      actionId: response
      name: API Response
      requires:
        - setup
    run:
      validations:
        methods: [GET, POST]
        routes: [/api/demo]

      apiResponse:
        response:
          # Arithmetic
          doubled: "{{ get('value') * get('multiplier') }}"
          total_price: "{{ get('base_price') * get('quantity') }}"

          # Comparison
          passed: "{{ get('score') >= 80 ? 'Pass' : 'Fail' }}"

          # Default fallback
          label: "{{ default(get('label'), 'default-label') }}"

          # Timestamp from info
          generated_at: "{{ info('current_time') }}"
