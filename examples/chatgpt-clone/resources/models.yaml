actionId: modelsResource
name: Available Models
description: Returns list of available LLM models

# Only respond to GET requests on /api/v1/models
validations:
  methods:
    - GET
  routes:
    - /api/v1/models

# Model ids are llamafile registry aliases (kdeps llamafile list);
# each resolves to a local llamafile downloaded on first use.
before:
  - >-
    set('availableModels', [
      {"id": "llama3.2:1b", "name": "Llama 3.2 (1B)", "description": "Meta's smallest and fastest model (~1.1 GB)"},
      {"id": "llama3.2:1b-q6", "name": "Llama 3.2 (1B, Q6)", "description": "Higher-quality quantization of the 1B model (~1.5 GB)"},
      {"id": "llama3.2:3b", "name": "Llama 3.2 (3B)", "description": "Meta's efficient model, good balance of speed and quality (~2.2 GB)"},
      {"id": "llama3.1:8b", "name": "Llama 3.1 (8B)", "description": "Larger model with stronger reasoning (~5.2 GB)"},
      {"id": "qwen3.5:0.8b", "name": "Qwen 3.5 (0.8B)", "description": "Tiny and fast multilingual model (~1.3 GB)"},
      {"id": "qwen3.5:2b", "name": "Qwen 3.5 (2B)", "description": "Multilingual model with strong quality for its size (~3 GB)"}
    ])
