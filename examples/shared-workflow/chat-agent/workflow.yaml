apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: chat-agent
  description: Secured chat workflow importing shared auth.
  version: "1.0.0"
  targetActionId: chatResponse
  workflows:
    - "@auth-base" # imports the sibling auth-base workflow

settings:
  apiServerMode: true
  hostIp: "0.0.0.0"
  portNum: 16395

  apiServer:
    routes:
      - path: /api/v1/chat
        methods: [POST]

  agentSettings:
    timezone: Etc/UTC
    installOllama: true
    models:
      - llama3.2:1b
