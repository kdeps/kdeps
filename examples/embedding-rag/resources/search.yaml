apiVersion: kdeps.io/v1
kind: Resource
metadata:
  actionId: searchDocs
run:
  validations:
    methods: [POST]
    routes: [/search]
    check:
      - get('query') != ''
    error:
      code: 400
      message: "query is required"
  embedding:
    operation: search
    text: "{{ get('query') }}"
    collection: "{{ get('collection', 'docs') }}"
    limit: 5
