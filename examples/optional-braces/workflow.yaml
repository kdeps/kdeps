apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: optional-braces-demo
  description: Demonstrates optional {{ }} syntax for direct expressions vs string interpolation
  version: "1.0.0"
  targetActionId: mixed

settings:
  apiServerMode: true
  hostIp: "0.0.0.0"
  portNum: 16395

  apiServer:
    routes:
      - path: /api/demo
        methods: [GET, POST]
    cors:
      enableCors: true
      allowOrigins:
        - "*"

  agentSettings:
    timezone: Etc/UTC

resources:
  - apiVersion: kdeps.io/v1
    kind: Resource
    metadata:
      actionId: withoutBraces
      name: Direct Expressions Without Braces
    run:
      validations:
        methods: [GET, POST]
        routes: [/api/demo]

      apiResponse:
        response:
          # Direct expressions WITHOUT braces
          query: get('q')
          count: get('count')
          isValid: get('count') > 0

  - apiVersion: kdeps.io/v1
    kind: Resource
    metadata:
      actionId: withBraces
      name: String Interpolation With Braces
      requires:
        - withoutBraces
    run:
      apiResponse:
        response:
          # String interpolation REQUIRES braces
          greeting: "You searched for: {{ get('q') }}"
          summary: "Found {{ get('count') }} results"
          queryResult: "Query: {{ get('q') }}"

  - apiVersion: kdeps.io/v1
    kind: Resource
    metadata:
      actionId: mixed
      name: Mixed Direct and Interpolated
      requires:
        - withBraces
    run:
      apiResponse:
        response:
          # Direct without braces
          count: get('count')
          # Interpolation with braces
          message: "Got {{ get('count') }} results for: {{ get('q') }}"
