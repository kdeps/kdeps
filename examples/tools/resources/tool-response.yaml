apiVersion: kdeps.io/v1
kind: Resource

metadata:
  actionId: toolResponse
  name: Tool Response
  requires:
    - llmWithTools

run:
  validations:
    methods: [POST]
    routes: [/api/v1/tools]
  apiResponse:
    success: true
    response:
      query: "{{ get('q', 'param') }}"
      llm_response: "{{ get('llmWithTools') }}"
      tools_available: true
