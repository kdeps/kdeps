name: Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-nightly*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    if: "!contains(github.ref_name, '-nightly')"
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Get macOS SDK path
        id: macos_sdk
        run: echo "path=$(xcrun --show-sdk-path)" >> $GITHUB_OUTPUT

      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          SDK_PATH: ${{ steps.macos_sdk.outputs.path }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Trigger build-server redeploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          repository: kdeps/kdeps-io
          event-type: kdeps-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
