name: Build and Test

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Read golangci-lint version
        id: lint-version
        run: echo "version=$(cat .golangci-lint-version)" >> "$GITHUB_OUTPUT"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.lint-version.outputs.version }}
          args: --timeout=10m --config=.golangci.yml ./cmd/... ./pkg/... ./tests/...
          only-new-issues: false
      - name: govulncheck
        run: |
          set +e
          go tool govulncheck ./... > /tmp/govuln.txt 2>&1
          exit_code=$?
          set -e
          cat /tmp/govuln.txt
          if [ $exit_code -ne 0 ]; then
            # GO-2026-4887, GO-2026-4883: docker/docker daemon-side vulns, no fix available (v28.5.2 is latest)
            new_vulns=$(grep "^Vulnerability #" /tmp/govuln.txt | grep -v "GO-2026-4887\|GO-2026-4883" || true)
            if [ -n "$new_vulns" ]; then exit 1; fi
          fi

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      UV_NO_CACHE: 1
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama --version

    # We need golangci-lint installed because 'make test-unit' depends on 'lint'
    - name: Install golangci-lint
      run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin $(cat .golangci-lint-version)

    - name: Build
      run: make build

    - name: Start Ollama
      run: |
        ollama serve &
        sleep 5
        ollama pull tinydolphin

    - name: Test Unit
      run: make test-unit
      timeout-minutes: 15

    - name: Upload unit coverage
      uses: codecov/codecov-action@v5
      with:
        files: coverage.out
        flags: unit
        name: unit
        fail_ci_if_error: false

    - name: Test Integration
      run: make test-integration
      timeout-minutes: 15

    - name: Upload integration coverage
      uses: codecov/codecov-action@v5
      with:
        files: coverage-integration.out
        flags: integration
        name: integration
        fail_ci_if_error: false

    - name: Test E2E
      run: make test-e2e
      timeout-minutes: 15
