apiVersion: kdeps.io/v1
kind: Resource

metadata:
  actionId: generate
  name: LLM Generate

run:
  chat:
    model: llama3.2:1b
    role: user
    prompt: "{{ get('prompt') }}"
    scenario:
      - role: system
        prompt: |
          You are a concise technical assistant.
          When style is "brief":  answer in exactly 1-2 sentences.
          When style is "detailed": answer in a full paragraph (4-6 sentences).
          Current style: {{ get('style', 'brief') }}
    jsonResponse: true
    jsonResponseKeys:
      - answer
    timeoutDuration: 60s
