apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: llm-chat
  description: Interactive LLM chat - stdin REPL mode
  version: "1.0.0"
  targetActionId: chat

settings:
  # sources: [api] Start the LLM REPL with --interactive flag.
  # executionType: stdin starts an interactive REPL on stdin/stdout.
  # executionType: apiServer starts the HTTP API server instead.
  input:
    sources: [api]
  llm:
    executionType: stdin
    prompt: "You: "
    sessionId: "llm-chat-session"


  agentSettings:
    timezone: Etc/UTC
    pythonVersion: "3.12"
