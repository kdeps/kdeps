apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: control-flow-examples
  description: Demonstrates control flow using ternary, logical operators, and list operations
  version: "1.0.0"
  targetActionId: controlFlowDemo

settings:
  apiServerMode: true
  hostIp: "0.0.0.0"
  portNum: 16395

  apiServer:
    routes:
      - path: /api/demo
        methods: [GET, POST]
    cors:
      enableCors: true
      allowOrigins:
        - "*"

  agentSettings:
    timezone: Etc/UTC

resources:
  - apiVersion: kdeps.io/v1
    kind: Resource
    metadata:
      actionId: controlFlowDemo
      name: Control Flow Demo
    run:
      validations:
        methods: [GET, POST]
        routes: [/api/demo]

      expr:
        # 1. IF-ELSE via ternary
        - "set('age_label_20', 20 >= 18 ? 'adult' : 'child')"
        - "set('age_label_15', 15 >= 18 ? 'adult' : 'child')"

        # 2. Logical operators
        - "set('logic_and', 20 >= 18 && true)"
        - "set('logic_or', false || true)"
        - "set('logic_not', !false)"

        # 3. List operations (loop alternatives)
        - >-
          set('people', [
            {"name": "Alice", "age": 20},
            {"name": "Bob", "age": 15},
            {"name": "Carol", "age": 30}
          ])
        - "set('adults', filter(get('people'), {.age >= 18}))"
        - "set('names', map(get('people'), {.name}))"
        - "set('all_adults', all(get('people'), {.age >= 18}))"
        - "set('any_minor', any(get('people'), {.age < 18}))"

      apiResponse:
        response:
          ternary:
            age_20: "{{ get('age_label_20') }}"
            age_15: "{{ get('age_label_15') }}"
          logical:
            and_result: "{{ get('logic_and') }}"
            or_result: "{{ get('logic_or') }}"
            not_result: "{{ get('logic_not') }}"
          list_operations:
            adults: "{{ get('adults') }}"
            names: "{{ get('names') }}"
            all_adults: "{{ get('all_adults') }}"
            any_minor: "{{ get('any_minor') }}"
