apiVersion: kdeps.io/v1
kind: Resource

metadata:
  actionId: analyze-jobs
  name: analyze-jobs
  description: |
    Ask the local LLM to score every job listing (0-100) against the
    candidate profile in a single batch call.

    Returns a JSON array parallel to parse-jobs, adding:
      match_score    integer 0-100
      match_reasons  string[]  skills/experience that align
      gaps           string[]  required skills the candidate lacks
  requires: [parse-jobs]

run:
  chat:
    backend: ollama
    model: llama3.2
    role: user
    prompt: |
      You are a job-fit analyst.  Score each job listing against the
      candidate profile and return ONLY a valid JSON array - no prose,
      no markdown fences, no extra keys.

      Candidate: {{ get('candidate_name') }}
      Profile:
      {{ get('candidate_profile') }}

      Jobs (JSON):
      {{ get('parse-jobs') | toJSON() }}

      Return one JSON object per job IN THE SAME ORDER as the input:
      [
        {
          "job_id":        "<copied from input>",
          "title":         "<copied from input>",
          "company":       "<copied from input>",
          "location":      "<copied from input>",
          "apply_link":    "<copied from input>",
          "is_remote":     true/false,
          "match_score":   <integer 0-100>,
          "match_reasons": ["reason 1", "reason 2"],
          "gaps":          ["gap 1", "gap 2"]
        }
      ]

      Scoring guide:
        90-100  Near-perfect fit - nearly all requirements met
        70-89   Strong match - most requirements met
        50-69   Partial match - some requirements met
        0-49    Poor fit - significant gaps

      match_reasons: skills or experience that directly align with the role.
      gaps:          required qualifications the candidate appears to lack.
      Include ALL jobs; do not skip any.
    jsonResponse: true
    jsonResponseKeys:
      - job_id
      - match_score
    timeoutDuration: 120s
    scenario:
      - role: assistant
        prompt: >-
          You are a precise job-fit analyst. You return only valid JSON arrays,
          never prose or markdown.
