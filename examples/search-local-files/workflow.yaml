apiVersion: kdeps.io/v1
kind: Workflow
metadata:
  name: search-local-files
  description: Local filesystem search using the native searchLocal executor
  version: "1.0.0"
  targetActionId: response
settings:
  apiServer:
    portNum: 16404
    routes:
      - path: /search
        methods: [POST]
  agentSettings:
    timezone: Etc/UTC
    pythonVersion: "3.12"
