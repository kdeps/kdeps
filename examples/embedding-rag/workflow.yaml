apiVersion: kdeps.io/v1
kind: Workflow
metadata:
  name: embedding-rag
  description: Simple RAG pipeline - index documents and search them with the native embedding executor
  version: "1.0.0"
  targetActionId: response
settings:
  apiServerMode: true
  hostIp: "0.0.0.0"
  portNum: 16403
  apiServer:
    routes:
      - path: /index
        methods: [POST]
      - path: /search
        methods: [POST]
  agentSettings:
    timezone: Etc/UTC
    pythonVersion: "3.12"
