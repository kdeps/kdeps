apiVersion: kdeps.io/v1
kind: Resource
metadata:
  actionId: summarize
  requires: [fetch]
run:
  chat:
    model: llama3.2:1b
    role: user
    prompt: |
      Summarize the following web page content in 3-5 sentences.

      URL: {{ get('url') }}
      Content:
      {{ output('fetch').content }}
    jsonResponse: true
    jsonResponseKeys:
      - summary
    timeoutDuration: 60s
