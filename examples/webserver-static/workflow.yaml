apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: webserver-static
  description: Static file serving with WebServer mode
  version: 1.0.0
  targetActionId: "none"

settings:

  webServer:
    portNum: 16395
    routes:
      - path: "/"
        serverType: "static"
        publicPath: "./public"

  agentSettings:
    timezone: "UTC"
