apiVersion: kdeps.io/v1
kind: Resource

metadata:
  actionId: callResponse
  name: Call Response
  requires:
    - ttsResponse

run:
  validations:
    methods: [POST]
    routes: [/api/v1/call]
  apiResponse:
    success: true
    response:
      transcript: "{{ inputTranscript }}"
      answer: "{{ get('llmResponse') }}"
      audio: "{{ ttsOutput }}"
