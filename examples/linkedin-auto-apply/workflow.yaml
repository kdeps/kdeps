apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: linkedin-auto-apply
  description: |
    Automated LinkedIn job applicant using a headless Chromium browser.

    Replicates the full auto-apply bot flow natively:
      1. Load candidate profile from the file input source (--file, stdin, or KDEPS_FILE_PATH)
      2. Validate required inputs and personal details
      3. Log in to LinkedIn (browser, session persisted)
      4. Search for jobs and extract listings (browser, JS evaluate)
      5. Score and filter jobs against the candidate profile (LLM, per-job)
      6. Apply to each matched job via Easy Apply (browser, per-job):
         - Click "Easy Apply"
         - Upload resume
         - Answer form questions (text, select, radio, checkbox, textarea)
           using predefined answers + LLM for unknown questions
         - Submit application
      7. Return applied/skipped/failed summary

    Requirements:
      - Ollama running locally with llama3.2 installed
      - A profile markdown file (joel-profile.md or sample-profile.md) with YAML front matter
      - Chrome must be fully closed before running (profile lock)

    To run:
      kdeps run examples/linkedin-auto-apply --file sample-profile.md
      cat joel-profile.md | kdeps run examples/linkedin-auto-apply
      KDEPS_FILE_PATH=joel-profile.md kdeps run examples/linkedin-auto-apply
  version: "1.0.0"
  targetActionId: response
  resources:
    - resources/00-load-profile.yaml
    - resources/00-set-profile.yaml
    - resources/01-validate.yaml
    - resources/02-login.yaml
    - resources/03-search-jobs.yaml
    - resources/04-analyze-jobs.yaml
    - resources/05-apply-job.yaml
    - resources/06-response.yaml

settings:
  apiServerMode: false

  input:
    sources: ["file"]
    file:
      path: sample-profile.md

  agentSettings:
    timezone: "UTC"
    pythonVersion: "3.12"
    installOllama: true
    models:
      - llama3.2
