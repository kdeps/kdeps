apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: vision
  description: Vision model example with image upload and analysis
  version: "1.0.0"
  targetActionId: visionResponse

settings:

  apiServer:
    portNum: 16395
    routes:
      - path: /api/v1/vision
        methods: [POST]
    cors:
      allowOrigins:
        - "*"

  agentSettings:
    timezone: Etc/UTC
    pythonVersion: "3.12"
    installOllama: true  # multimodal chat needs the ollama backend
    env:
      KDEPS_DEFAULT_BACKEND: ollama
