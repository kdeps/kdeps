apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: llm-chat-tools
  description: Interactive LLM chat with 9 built-in tools (stdin REPL)
  version: "1.0.0"
  targetActionId: chat

settings:
  input:
    sources: [llm]
    llm:
      executionType: stdin
      prompt: "You: "
      sessionId: "chat-tools-session"

  hostIp: "0.0.0.0"
  portNum: 16401

  agentSettings:
    timezone: Etc/UTC
    pythonVersion: "3.12"
    installOllama: true
    models:
      - llama3.2
