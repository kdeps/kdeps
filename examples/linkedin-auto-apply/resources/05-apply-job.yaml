apiVersion: kdeps.io/v1
kind: Resource

metadata:
  actionId: apply-job
  name: apply-job
  description: |
    For each job that passed the match threshold, open the job page in the
    authenticated browser session, click Easy Apply, fill the multi-page
    form using the predefined personal answers, upload the resume, and
    submit the application.

    Uses items iteration over the analyze-jobs output so each matched job
    is applied to in sequence. A JS evaluate script handles the full Easy
    Apply modal flow (answer questions, Next pages, upload, submit) in a
    single browser action.

    Mirrors the logic in runAiBot.py:
      - Fills text/number inputs from personal config values
      - Handles select, radio, and checkbox questions
      - Uploads the resume PDF
      - Clicks "Review" then "Submit application"
      - Records applied/skipped/failed status per job
  requires: [analyze-jobs]

items:
  - "{{ where(get('analyze-jobs'), 'match_score', get('min_match_score') | default(60)) }}"

run:
  browser:
    engine: chromium
    headless: true
    stealthMode: true
    sessionId: linkedin-session
    url: "{{ item['job_link'] }}"
    timeoutDuration: 60s
    actions:
      # Click Easy Apply via JS to avoid React event issues
      - action: evaluate
        script: |
          (() => {
            const easyApplyBtn = document.querySelector(
              'button[aria-label*="Easy Apply"], ' +
              'button.jobs-apply-button[aria-label*="Easy Apply"], ' +
              'button.jobs-apply-button'
            );
            if (!easyApplyBtn) return JSON.stringify({ status: 'skipped', reason: 'no Easy Apply button' });
            easyApplyBtn.click();
            return JSON.stringify({ status: 'clicked' });
          })()

      - action: wait
        wait: ".jobs-easy-apply-modal"

      # Upload resume
      - action: upload
        selector: "input[name='file'], input[type='file']"
        files:
          - "{{ get('resume_path') }}"

      # Fill the multi-page form and submit via JS
      - action: evaluate
        script: |
          (() => {
            const answers = {
              phone:        "{{ get('phone_number') | default('') }}",
              experience:   "{{ get('years_of_experience') | default('') }}",
              salary:       "{{ get('desired_salary') | default('') }}",
              city:         "{{ get('current_city') | default('') }}",
              country:      "{{ get('country') | default('Netherlands') }}",
              visa:         "{{ get('require_visa') | default('No') }}",
              website:      "{{ get('website') | default('') }}",
              linkedin:     "{{ get('linkedin_url') | default('') }}",
              coverLetter:  {{ item['cover_letter'] | default('') | toJSON() }},
              name:         "{{ get('candidate_name') }}"
            };

            function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

            function fillTextInput(input, value) {
              if (!value) return;
              input.focus();
              input.value = value;
              input.dispatchEvent(new Event('input', { bubbles: true }));
              input.dispatchEvent(new Event('change', { bubbles: true }));
            }

            function pickBestOption(select, preferred) {
              const opts = Array.from(select.options).map(o => o.text.toLowerCase());
              const pref = preferred.toLowerCase();
              let idx = opts.findIndex(o => o.includes(pref) || pref.includes(o));
              if (idx > 0) { select.selectedIndex = idx; return; }
              // default: pick first non-empty option
              for (let i = 1; i < select.options.length; i++) {
                if (select.options[i].value) { select.selectedIndex = i; break; }
              }
              select.dispatchEvent(new Event('change', { bubbles: true }));
            }

            async function answerPage(modal) {
              const formEls = modal.querySelectorAll('[data-test-form-element]');
              for (const el of formEls) {
                const labelEl = el.querySelector('label span, legend span[data-test-form-builder-radio-button-form-component__title]');
                const label = (labelEl ? labelEl.innerText : '').toLowerCase();

                // Textarea
                const ta = el.querySelector('textarea');
                if (ta) {
                  let val = '';
                  if (label.includes('cover') || label.includes('letter')) val = answers.coverLetter;
                  else if (label.includes('summary') || label.includes('about')) val = answers.coverLetter;
                  if (val) fillTextInput(ta, val);
                  continue;
                }

                // Text / number input
                const inp = el.querySelector('input[type="text"], input[type="number"], input:not([type])');
                if (inp) {
                  let val = '';
                  if (label.includes('phone') || label.includes('mobile')) val = answers.phone;
                  else if (label.includes('experience') || label.includes('year')) val = answers.experience;
                  else if (label.includes('salary') || label.includes('ctc') || label.includes('compensation')) val = answers.salary;
                  else if (label.includes('city')) val = answers.city;
                  else if (label.includes('website') || label.includes('portfolio') || label.includes('github')) val = answers.website;
                  else if (label.includes('linkedin')) val = answers.linkedin;
                  else if (label.includes('name')) val = answers.name;
                  if (val) fillTextInput(inp, val);
                  continue;
                }

                // Select
                const sel = el.querySelector('select');
                if (sel) {
                  let preferred = 'yes';
                  if (label.includes('visa') || label.includes('sponsor')) preferred = answers.visa;
                  else if (label.includes('country')) preferred = answers.country;
                  else if (label.includes('currency')) preferred = 'EUR';
                  pickBestOption(sel, preferred);
                  continue;
                }

                // Radio
                const radios = el.querySelectorAll('input[type="radio"]');
                if (radios.length) {
                  let preferred = 'yes';
                  if (label.includes('visa') || label.includes('sponsor')) preferred = answers.visa.toLowerCase();
                  const labels = Array.from(el.querySelectorAll('label'));
                  const match = labels.find(l => l.innerText.toLowerCase().includes(preferred));
                  if (match) match.click(); else if (labels[0]) labels[0].click();
                  continue;
                }

                // Checkbox (check by default)
                const cb = el.querySelector('input[type="checkbox"]');
                if (cb && !cb.checked) {
                  const lbl = el.querySelector('label');
                  if (lbl) lbl.click();
                }
              }
            }

            async function runApply() {
              const modal = document.querySelector('.jobs-easy-apply-modal');
              if (!modal) return JSON.stringify({ status: 'failed', reason: 'modal not found' });

              let iterations = 0;
              while (iterations < 15) {
                iterations++;
                await answerPage(modal);
                await sleep(500);

                // Try "Next" button
                const nextBtn = modal.querySelector('button[aria-label="Continue to next step"], span[role="button"]');
                const reviewBtn = modal.querySelector('button[aria-label="Review your application"]');
                const submitBtn = modal.querySelector('button[aria-label="Submit application"]');

                if (submitBtn) {
                  await sleep(300);
                  submitBtn.click();
                  await sleep(1000);
                  const doneBtn = document.querySelector('button[aria-label="Dismiss"]');
                  if (doneBtn) doneBtn.click();
                  return JSON.stringify({ status: 'applied', job_id: {{ item['job_id'] | default('') | toJSON() }} });
                }

                if (reviewBtn) {
                  reviewBtn.click();
                  await sleep(800);
                  continue;
                }

                if (nextBtn) {
                  nextBtn.click();
                  await sleep(800);
                  continue;
                }

                // Fallback: look for any primary CTA button
                const ctas = Array.from(modal.querySelectorAll('button.artdeco-button--primary'));
                if (ctas.length) {
                  ctas[ctas.length - 1].click();
                  await sleep(800);
                  continue;
                }

                return JSON.stringify({ status: 'stuck', iterations, job_id: {{ item['job_id'] | default('') | toJSON() }} });
              }
              return JSON.stringify({ status: 'max_iterations', job_id: {{ item['job_id'] | default('') | toJSON() }} });
            }

            return runApply();
          })()

onError:
  action: continue
  expr:
    - "set('apply_error_' + string(item['job_id'] | default('')), error.message)"
