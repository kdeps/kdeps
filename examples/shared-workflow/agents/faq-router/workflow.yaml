apiVersion: kdeps.io/v1
kind: Workflow

# Entry-point agent.  Exposes POST /api/v1/faq and calls the shared-llm
# agent TWICE with different params — once for a brief answer and once for
# a detailed answer — then returns both in a single JSON response.

metadata:
  name: faq-router
  description: FAQ entry point — calls shared-llm twice with different style params
  version: "1.0.0"
  targetActionId: faqResponse

settings:
  apiServerMode: true
  hostIp: "0.0.0.0"
  portNum: 16395

  apiServer:
    routes:
      - path: /api/v1/faq
        methods: [POST]
    cors:
      enableCors: true
      allowOrigins:
        - "*"

  agentSettings:
    timezone: Etc/UTC
    installOllama: true
    models:
      - llama3.2:1b
