name: Nightly Release

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  packages: write

concurrency:
  group: nightly-release
  cancel-in-progress: false

jobs:
  update-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install huggingface_hub (for llamafile harvest)
        run: pip3 install --break-system-packages -q huggingface_hub 2>/dev/null || pip3 install -q huggingface_hub

      - name: Cache HuggingFace Hub
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/huggingface
          key: hf-hub-${{ hashFiles('tools/llamafile-harvester/harvest.py') }}

      - name: Harvest llamafile registry
        id: harvest_llamafiles
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 tools/llamafile-harvester/harvest.py --write --gguf || echo "harvest failed; keeping committed registry"
          if git diff --quiet pkg/executor/llm/llamafile_versions_data.go tools/llamafile-harvester/llamafile_versions.yaml pkg/executor/llm/gguf_versions_data.go tools/llamafile-harvester/gguf_versions.yaml 2>/dev/null; then
            echo "has_registry_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_registry_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for changes
        id: check_changes
        run: |
          LATEST_RELEASE_TAG=$(git tag -l 'v*' --sort=-version:refname | head -n 1)

          if [ -z "$LATEST_RELEASE_TAG" ]; then
            echo "No previous release found, will create release"
            echo "has_code_changes=true" >> $GITHUB_OUTPUT
          else
            echo "Latest release tag: $LATEST_RELEASE_TAG"
            if ! git rev-parse --verify "$LATEST_RELEASE_TAG" >/dev/null 2>&1; then
              echo "Warning: Tag $LATEST_RELEASE_TAG does not exist, will create release"
              echo "has_code_changes=true" >> $GITHUB_OUTPUT
            else
              if git diff --quiet "$LATEST_RELEASE_TAG" HEAD; then
                echo "has_code_changes=false" >> $GITHUB_OUTPUT
                echo "No code changes since latest release"
              else
                echo "has_code_changes=true" >> $GITHUB_OUTPUT
                echo "Code changes detected since latest release"
              fi
            fi
          fi

      - name: Determine if release needed
        id: should_release
        run: |
          HAS_CODE_CHANGES="${{ steps.check_changes.outputs.has_code_changes }}"
          HAS_REGISTRY_UPDATES="${{ steps.harvest_llamafiles.outputs.has_registry_updates }}"
          HAS_CODE_CHANGES="${HAS_CODE_CHANGES:-false}"
          HAS_REGISTRY_UPDATES="${HAS_REGISTRY_UPDATES:-false}"
          if [ "$HAS_CODE_CHANGES" = "true" ] || [ "$HAS_REGISTRY_UPDATES" = "true" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Release will be created (code_changes=$HAS_CODE_CHANGES, registry_updates=$HAS_REGISTRY_UPDATES)"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No release needed"
          fi

      - name: Read golangci-lint version
        if: steps.should_release.outputs.should_release == 'true'
        id: lint-version
        run: echo "version=$(cat .golangci-lint-version)" >> "$GITHUB_OUTPUT"

      - name: Run linter
        if: steps.should_release.outputs.should_release == 'true'
        id: lint
        run: |
          BIN_DIR="$(go env GOPATH)/bin"
          VERSION="${{ steps.lint-version.outputs.version }}"
          curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/${VERSION}/install.sh" | sh -s -- -b "$BIN_DIR" "$VERSION"
          set +e
          "$BIN_DIR/golangci-lint" run --timeout=10m --config=.golangci.yml
          LINT_EXIT=$?
          set -e
          echo "result=$([ $LINT_EXIT -eq 0 ] && echo 'success' || echo 'failure')" >> "$GITHUB_OUTPUT"

      - name: Build
        if: steps.should_release.outputs.should_release == 'true'
        id: build
        run: make build

      - name: Commit llamafile registry updates
        if: steps.harvest_llamafiles.outputs.has_registry_updates == 'true'
        run: |
          git add pkg/executor/llm/llamafile_versions_data.go tools/llamafile-harvester/llamafile_versions.yaml
          git add pkg/executor/llm/gguf_versions_data.go tools/llamafile-harvester/gguf_versions.yaml 2>/dev/null || true
          git commit -m "chore: update llamafile/GGUF registry [nightly]"
          git pull --rebase origin main
          git push origin main

      - name: Create nightly tag and clean up existing release
        if: steps.should_release.outputs.should_release == 'true'
        id: create_tag
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          LATEST_RELEASE_TAG=$(git tag -l 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)

          if [ -n "$LATEST_RELEASE_TAG" ]; then
            BASE_VERSION=$(echo "$LATEST_RELEASE_TAG" | sed 's/^v//')
          else
            BASE_VERSION=$(sed -n 's/.*Version = "\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\).*/\1/p' pkg/version/version.go)
          fi

          if [ -z "$BASE_VERSION" ]; then
            echo "Error: Failed to extract version"
            exit 1
          fi

          NIGHTLY_TAG="v${BASE_VERSION}-nightly$(date +%Y%m%d%H%M)"
          echo "tag=$NIGHTLY_TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $NIGHTLY_TAG"

          if git rev-parse "$NIGHTLY_TAG" >/dev/null 2>&1; then
            echo "Tag $NIGHTLY_TAG already exists - cleaning up"
            if gh release view "$NIGHTLY_TAG" >/dev/null 2>&1; then
              gh release delete "$NIGHTLY_TAG" --yes --cleanup-tag || true
            fi
            git tag -d "$NIGHTLY_TAG" 2>/dev/null || true
            git push --delete origin "$NIGHTLY_TAG" 2>/dev/null || true
          fi

          git tag -a $NIGHTLY_TAG -m "Nightly release $(date +%Y-%m-%d-%H:%M)"
          git push origin $NIGHTLY_TAG
          echo "Tag created and pushed"

      - name: Set up Zig
        if: steps.should_release.outputs.should_release == 'true'
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2

      - name: Get macOS SDK path
        if: steps.should_release.outputs.should_release == 'true'
        id: macos_sdk
        run: echo "path=$(xcrun --show-sdk-path)" >> $GITHUB_OUTPUT

      - name: Clean up existing release before GoReleaser
        if: steps.should_release.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ steps.create_tag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes || true
            sleep 2
            if gh release view "$TAG" >/dev/null 2>&1; then
              RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$TAG --jq '.id' 2>/dev/null)
              if [ -n "$RELEASE_ID" ]; then
                gh api -X DELETE repos/${{ github.repository }}/releases/$RELEASE_ID || true
                sleep 2
              fi
            fi
            MAX_WAIT=60; ELAPSED=0
            while gh release view "$TAG" >/dev/null 2>&1 && [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
              sleep 3; ELAPSED=$((ELAPSED + 3))
            done
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG still exists after cleanup"; exit 1
            fi
          fi

      - name: Clean cmd test artifacts before release
        if: steps.should_release.outputs.should_release == 'true'
        run: |
          git clean -fd -- cmd/
          if [ -n "$(git status --porcelain)" ]; then
            git status --porcelain
          fi

      - name: Release with GoReleaser
        if: steps.should_release.outputs.should_release == 'true'
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: latest
          args: release --clean
        env:
          SDK_PATH: ${{ steps.macos_sdk.outputs.path }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.create_tag.outputs.tag }}

      - name: Update release status and notes
        if: steps.should_release.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ steps.create_tag.outputs.tag }}"
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$TAG --jq '.id')
          CURRENT_BODY=$(gh api repos/${{ github.repository }}/releases/$RELEASE_ID --jq '.body')
          RELEASE_NOTES="$CURRENT_BODY"$'\n\n'"---"$'\n\n'"### Build Status"$'\n'"- Linting: ${{ steps.lint.outputs.result }}"$'\n'"- Build: ${{ steps.build.outcome }}"
          gh api -X PATCH repos/${{ github.repository }}/releases/$RELEASE_ID \
            -f body="$RELEASE_NOTES" \
            -f prerelease=false \
            -f make_latest=true

      - name: Summary
        run: |
          if [ "${{ steps.should_release.outputs.should_release }}" = "true" ]; then
            echo "Nightly release created: ${{ steps.create_tag.outputs.tag }}"
            echo "Checks: lint=${{ steps.lint.outputs.result }} build=${{ steps.build.outcome }}"
            [ "${{ steps.check_changes.outputs.has_code_changes }}" = "true" ] && echo "Code changes since last release"
            [ "${{ steps.harvest_llamafiles.outputs.has_registry_updates }}" = "true" ] && echo "Llamafile registry updated"
          else
            echo "No changes since last release. Skipping nightly release."
          fi
