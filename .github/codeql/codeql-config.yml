name: "KDeps CodeQL Config"

paths-ignore:
  - "kdeps-io.old/"
  - "private/"

# NOTE: query-filters can only exclude whole queries; per-path filtering is
# not supported by CodeQL config, so these are repo-wide with justification.
query-filters:
  # ResponseWriterWrapper.Write routes browser-rendered content through html.EscapeString.
  # The unescaped path is only reachable for non-browser content types (JSON, binary).
  # This is a false positive — the XSS guard is the browserRenderedContentType check above it.
  - exclude:
      id: go/reflected-xss
  # kdeps is a workflow engine: workflow YAML written by the operator intentionally
  # supplies the SQL queries, shell commands, scripts, and file paths executed at
  # runtime (pkg/executor/sql, pkg/executor/exec, pkg/executor/python,
  # pkg/executor/llm, pkg/infra/python). The "untrusted" source is the user's own
  # config file, equivalent to Make executing a Makefile.
  - exclude:
      id: go/sql-injection
  - exclude:
      id: go/command-injection
  - exclude:
      id: go/path-injection
  # Session cookies are HTTP-only dev tokens; Secure is set when TLS is enabled
  # (pkg/infra/http/http_session.go).
  - exclude:
      id: go/cookie-secure-not-set
