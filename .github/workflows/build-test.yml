name: Build and Test

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.github/coverage-badge.json'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.github/coverage-badge.json'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          trivyignores: .trivyignore
          skip-dirs: docs/v2/node_modules,kdeps-io,kdeps-io.bak,private,.git
          skip-files: coverage.out,coverage-integration.out

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - name: Build kdeps binary
        run: make build
      - name: Build sample Docker image
        run: ./kdeps bundle build examples/webserver-static --tag kdeps-ci-scan:local
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: kdeps-ci-scan:local
          severity: CRITICAL,HIGH
          exit-code: 1
          trivyignores: .trivyignore

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
      - name: Install golangci-lint
        run: |
          set -euo pipefail
          VERSION="$(cat .golangci-lint-version)"
          BIN_DIR="$(go env GOPATH)/bin"
          for attempt in 1 2 3 4 5; do
            if curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/${VERSION}/install.sh" | sh -s -- -b "$BIN_DIR" "$VERSION"; then
              echo "$BIN_DIR" >> "$GITHUB_PATH"
              golangci-lint version
              exit 0
            fi
            echo "golangci-lint install attempt $attempt failed; retrying in $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          exit 1
      - name: golangci-lint
        run: golangci-lint run --timeout=10m --config=.golangci.yml ./cmd/... ./pkg/... ./tests/...
      - name: govulncheck
        run: |
          set +e
          go tool govulncheck ./... > /tmp/govuln.txt 2>&1
          exit_code=$?
          set -e
          cat /tmp/govuln.txt
          if [ $exit_code -ne 0 ]; then
            # GO-2026-4887, GO-2026-4883: docker/docker daemon-side vulns, no fix available (v28.5.2 is latest)
            new_vulns=$(grep "^Vulnerability #" /tmp/govuln.txt | grep -v "GO-2026-4887\|GO-2026-4883" || true)
            if [ -n "$new_vulns" ]; then exit 1; fi
          fi

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      UV_NO_CACHE: 1
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: 'go.mod'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/0.11.20/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install ollama
      run: |
        curl -fsSL -o /tmp/ollama.tar.zst https://github.com/ollama/ollama/releases/download/v0.30.7/ollama-linux-amd64.tar.zst
        echo "88c110a6c9a9130e5ed0aa90f47e8ddb013cb638d834e11ddf1517615704d34c  /tmp/ollama.tar.zst" | sha256sum -c
        sudo tar --zstd -xf /tmp/ollama.tar.zst -C /usr/local
        ollama --version

    # We need golangci-lint installed because 'make test-unit' depends on 'lint'
    - name: Install golangci-lint
      run: |
        set -euo pipefail
        VERSION="$(cat .golangci-lint-version)"
        BIN_DIR="$(go env GOPATH)/bin"
        for attempt in 1 2 3 4 5; do
          if curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/${VERSION}/install.sh" | sh -s -- -b "$BIN_DIR" "$VERSION"; then
            echo "$BIN_DIR" >> "$GITHUB_PATH"
            golangci-lint version
            exit 0
          fi
          echo "golangci-lint install attempt $attempt failed; retrying in $((attempt * 15))s..."
          sleep $((attempt * 15))
        done
        exit 1

    # Tests run against the committed llamafile registry
    # (pkg/executor/llm/llamafile_versions_data.go); the registry is refreshed
    # and committed by the nightly workflow, never harvested live here.
    - name: Cache llamafile models
      uses: actions/cache@5a3b741034b46473a32912e53e790aad831be74f # v4
      with:
        path: ~/.kdeps/models
        key: llamafiles-${{ hashFiles('pkg/executor/llm/llamafile_versions_data.go') }}

    - name: Build
      run: make build

    - name: Start Ollama
      run: |
        ollama serve &
        sleep 5
        ollama pull tinydolphin

    - name: Test Unit
      run: make test-unit
      timeout-minutes: 15

    - name: Upload unit coverage artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: coverage-out
        path: coverage.out
        retention-days: 1

    - name: Test Integration
      run: make test-integration
      timeout-minutes: 15

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: kdeps/kdeps
        files: coverage.out,coverage-integration.out
        fail_ci_if_error: false

    # Populate the llamafile cache (no-op on cache hit) so the llamafile e2e
    # exercises the default file backend with a real model.
    - name: Pre-download default llamafile
      run: |
        mkdir -p ~/.kdeps/models
        FILE=~/.kdeps/models/Llama-3.2-1B-Instruct-Q4_K_M.llamafile
        if [ ! -f "$FILE" ]; then
          curl -fL --retry 3 -o "$FILE" \
            https://huggingface.co/mozilla-ai/Llama-3.2-1B-Instruct-llamafile/resolve/main/Llama-3.2-1B-Instruct-Q4_K_M.llamafile
        fi
        chmod +x "$FILE"

    - name: Test E2E
      run: make test-e2e
      timeout-minutes: 25
      env:
        KDEPS_E2E_LLAMAFILE_DOWNLOAD: "1"

  coverage-badge:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-out
      - name: Update coverage badge
        run: |
          COV=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
          NUM=${COV%\%}
          if awk "BEGIN {exit !($NUM >= 100)}"; then COLOR=brightgreen
          elif awk "BEGIN {exit !($NUM >= 90)}"; then COLOR=green
          elif awk "BEGIN {exit !($NUM >= 80)}"; then COLOR=yellowgreen
          elif awk "BEGIN {exit !($NUM >= 70)}"; then COLOR=yellow
          else COLOR=orange
          fi
          printf '%s\n' "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COV}\",\"color\":\"${COLOR}\"}" > .github/coverage-badge.json
      - name: Commit coverage badge
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: "chore: update coverage badge [skip ci]"
          file_pattern: .github/coverage-badge.json
