apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: federation-agent-b
  description: Federation demo — Echo agent (callee/server)
  version: "1.0.0"
  targetActionId: echoResource

settings:
  apiServerMode: true
  hostIp: "0.0.0.0"
  portNum: 16396

  apiServer:
    routes:
      - path: /api/v1/echo
        methods: [POST]
    cors:
      enableCors: true
      allowOrigins:
        - "*"

  agentSettings:
    timezone: Etc/UTC
    pythonVersion: "3.12"
    installOllama: false
