apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: tools
  description: LLM tool calling example with automatic tool execution
  version: "1.0.0"
  targetActionId: toolResponse

settings:

  apiServer:
    portNum: 16395
    routes:
      - path: /api/v1/tools
        methods: [POST]
    cors:
      allowOrigins:
        - "*"

  agentSettings:
    timezone: Etc/UTC
    pythonVersion: "3.12"
    installOllama: true
