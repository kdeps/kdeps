apiVersion: kdeps.io/v1
kind: Resource

# Second call to the SAME shared workflow, this time with style=detailed.
# Both briefAnswer and detailedAnswer reference the same shared-llm agent
# — that's the "shared workflow" pattern.

metadata:
  actionId: detailedAnswer
  name: Detailed Answer (via shared-llm)
  requires:
    - briefAnswer   # run after briefAnswer so both results are ready together

run:
  agent:
    name: shared-llm
    params:
      prompt: "{{ get('q') }}"
      style: "detailed"
