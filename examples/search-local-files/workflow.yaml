apiVersion: kdeps.io/v1
kind: Workflow
metadata:
  name: search-local-files
  description: Local filesystem search using the native searchLocal executor
  version: "1.0.0"
  targetActionId: response
settings:
  apiServerMode: true
  hostIp: "0.0.0.0"
  portNum: 16404
  apiServer:
    routes:
      - path: /search
        methods: [POST]
  agentSettings:
    timezone: Etc/UTC
    pythonVersion: "3.12"
