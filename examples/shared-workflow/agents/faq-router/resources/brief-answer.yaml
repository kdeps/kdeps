apiVersion: kdeps.io/v1
kind: Resource

# First call to the shared workflow.
# Passes style=brief — the shared-llm agent will instruct the LLM to
# respond in 1-2 sentences.

metadata:
  actionId: briefAnswer
  name: Brief Answer (via shared-llm)

run:
  agent:
    name: shared-llm
    params:
      prompt: "{{ get('q') }}"
      style: "brief"
