apiVersion: kdeps.io/v1
kind: Workflow
metadata:
  name: scraper-native
  description: Web scraping + AI summarization using the native scraper executor
  version: "1.0.0"
  targetActionId: response
settings:
  apiServerMode: true
  hostIp: "0.0.0.0"
  portNum: 16402
  apiServer:
    routes:
      - path: /summarize
        methods: [POST]
  agentSettings:
    timezone: Etc/UTC
    pythonVersion: "3.12"
    installOllama: true
    models:
      - llama3.2:1b
