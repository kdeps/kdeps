apiVersion: kdeps.io/v1
kind: Resource

metadata:
  actionId: visionLLM
  name: Vision LLM

chat:
  model: llama3.2:1b
  role: "user"
  prompt: "{{ get('q') }}"
  files:
    # Get uploaded file path - use 'file' field name from upload
    - "{{ get('file', 'filepath') }}"
  jsonResponse: true
  jsonResponseKeys:
    - description
    - objects
    - scene
