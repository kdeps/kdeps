apiVersion: kdeps.io/v1
kind: Resource

metadata:
  actionId: search-jobs
  name: search-jobs
  description: |
    Navigate to the LinkedIn job search page, apply date/remote filters, and
    extract all visible job card data as a JSON array via JS evaluate.

    Reuses the authenticated browser session from the login step.
    Returns: job_id, title, company, location, work_style, job_link for each card.
  requires: [login]

run:
  browser:
    engine: chromium
    headless: true
    stealthMode: true
    sessionId: linkedin-session
    url: "https://www.linkedin.com/jobs/search/?keywords={{ urlencode(get('job_title')) }}&location={{ urlencode(default(get('location'), '')) }}&f_TPR={{ default(get('date_posted'), 'r604800') }}&f_WT={{ ternary(get('remote_only') == 'true', '2', '') }}&f_LF={{ ternary(get('easy_apply_only') == 'true', 'f_AL', '') }}"
    waitFor: "li[data-occludable-job-id]"
    timeoutDuration: 90s
    actions:
      - action: evaluate
        script: |
          (async () => {
            const wait = ms => new Promise(r => setTimeout(r, ms));
            const cards = Array.from(document.querySelectorAll('li[data-occludable-job-id]'));
            const results = [];
            for (const card of cards) {
              // Scroll card into view (same as Python bot's scroll_to_view) and wait
              // for LinkedIn's virtual DOM renderer to populate the card content.
              card.scrollIntoView({ behavior: 'instant', block: 'center' });
              let titleEl = null;
              for (let i = 0; i < 15; i++) {
                titleEl = card.querySelector('a');
                if (titleEl && titleEl.innerText.trim()) break;
                await wait(150);
              }
              const jobId = card.getAttribute('data-occludable-job-id') || '';
              const title = titleEl ? titleEl.innerText.split('\n')[0].trim() : '';
              const subtitleEl = card.querySelector('.artdeco-entity-lockup__subtitle');
              const subtitle = subtitleEl ? subtitleEl.innerText.trim() : '';
              const dotIdx = subtitle.indexOf(' \u00b7 ');
              const company = dotIdx > -1 ? subtitle.slice(0, dotIdx).trim() : subtitle.replace(/\s*\(.*\)\s*$/, '').trim();
              const location = dotIdx > -1 ? subtitle.slice(dotIdx + 3).replace(/\s*\(.*\)\s*$/, '').trim() : '';
              const workStyle = subtitle.match(/\(([^)]+)\)\s*$/)?.[1] || '';
              const stateEl = card.querySelector('.job-card-container__footer-job-state');
              const alreadyApplied = stateEl ? stateEl.innerText.trim() === 'Applied' : false;
              if (jobId && !alreadyApplied) {
                results.push({ job_id: jobId, title, company, location, work_style: workStyle,
                               already_applied: alreadyApplied,
                               job_link: 'https://www.linkedin.com/jobs/view/' + jobId });
              }
            }
            return results;
          })()
