apiVersion: kdeps.io/v1
kind: Component
metadata:
  name: embedding
  description: Generate text embeddings via OpenAI API
  version: "1.0.0"
interface:
  inputs:
    - name: text
      type: string
      required: true
      description: Text to embed
    - name: apiKey
      type: string
      required: true
      description: OpenAI API key
    - name: model
      type: string
      required: false
      default: text-embedding-ada-002
      description: Embedding model to use
resources:
  - apiVersion: kdeps.io/v1
    kind: Resource
    metadata:
      actionId: generate-embedding
    run:
      httpClient:
        url: "https://api.openai.com/v1/embeddings"
        method: POST
        headers:
          Authorization: "Bearer {{ get("embedding.apiKey") }}"
          Content-Type: application/json
        data: '{"model":"{{ get("embedding.model", "text-embedding-ada-002") }}","input":"{{ get("embedding.text") }}"}'
