apiVersion: kdeps.io/v1
kind: Workflow
metadata:
  name: chatgpt-clone
  version: "1.0.0"
  description: A ChatGPT-like interface with multiple open-source LLMs
  targetActionId: responseResource

settings:
  # Enable both API and Web server modes

  # Top-level server configuration

  apiServer:
    portNum: 16395
    routes:
      - path: /api/v1/chat
        methods: [POST]
      - path: /api/v1/models
        methods: [GET]
    cors:
      allowOrigins:
        - "*"
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - Content-Type
        - Authorization

  webServer:
    routes:
      - serverType: static
        path: /
        publicPath: ./public

  # Agent settings for Docker builds
  agentSettings:
    timezone: Etc/UTC
    installOllama: true
    # Pre-load these models when building Docker image
