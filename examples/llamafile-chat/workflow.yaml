apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: llamafile-chat
  description: LLM chatbot using a local llamafile binary (file backend)
  version: "1.0.0"
  targetActionId: responseResource

settings:

  apiServer:
    portNum: 16395
    routes:
      - path: /api/v1/chat
        methods: [POST]
    cors:
      allowOrigins:
        - "*"

  agentSettings:
    timezone: Etc/UTC
    pythonVersion: "3.12"
