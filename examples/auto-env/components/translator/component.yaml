apiVersion: kdeps.io/v1
kind: Component

metadata:
  name: translator
  description: |
    Translates text to a target language using the OpenAI API.
    Uses env('OPENAI_API_KEY') — override for this component only with
    TRANSLATOR_OPENAI_API_KEY without changing the global key.
  version: "1.0.0"
  targetActionId: translate

interface:
  inputs:
    - name: text
      type: string
      required: true
      description: Text to translate.
    - name: target_language
      type: string
      required: false
      description: Target language name (default "Spanish").

resources:
  - apiVersion: kdeps.io/v1
    kind: Resource
    metadata:
      actionId: translate
      name: Translate Text
    run:
      exec:
        command: |
          python3 - <<'PYEOF'
          import os, sys, json, urllib.request

          api_key = """{{ env('OPENAI_API_KEY') }}"""
          text    = """{{ input('text') }}"""
          lang    = """{{ input('target_language') }}"""
          if not lang:
              lang = "Spanish"

          if not api_key:
              print(json.dumps({"error": "OPENAI_API_KEY not set", "source": text}))
              sys.exit(0)

          payload = json.dumps({
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": f"Translate the following text to {lang}. Return only the translation."},
                  {"role": "user",   "content": text}
              ]
          }).encode()

          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=payload,
              headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"},
          )
          with urllib.request.urlopen(req) as resp:
              body = json.loads(resp.read())

          translation = body["choices"][0]["message"]["content"].strip()
          print(json.dumps({"source": text, "language": lang, "translation": translation}))
          PYEOF
