apiVersion: kdeps.io/v1
kind: Workflow
metadata:
  name: scraper-native
  description: Web scraping + AI summarization using the native scraper executor
  version: "1.0.0"
  targetActionId: response
settings:
  apiServer:
    portNum: 16402
    routes:
      - path: /summarize
        methods: [POST]
  agentSettings:
    timezone: Etc/UTC
    pythonVersion: "3.12"
