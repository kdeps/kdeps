apiVersion: kdeps.io/v1
kind: Resource

metadata:
  actionId: visionResponse
  name: Vision Response
  requires:
    - visionLLM

validations:
  methods: [POST]
  routes: [/api/v1/vision]
apiResponse:
  success: true
  response:
    query: "{{ get('q') }}"
    analysis: "{{ get('visionLLM') }}"
    file_info:
      filename: "{{ info('files') }}"
      filetype: "{{ info('filetypes') }}"
