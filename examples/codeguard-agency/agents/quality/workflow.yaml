apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: code-quality
  description: |
    Code quality review agent.  Checks readability, complexity, DRY violations,
    error handling, naming, and missing tests.
    Called by code-intake; not exposed externally.
  version: "1.0.0"
  targetActionId: quality-response

settings:
  apiServerMode: false

  agentSettings:
    timezone: "UTC"
    installOllama: true
    models:
      - llama3.2:3b

resources:

  # ── LLM quality analysis ──────────────────────────────────────────────────────
  - apiVersion: kdeps.io/v1
    kind: Resource
    metadata:
      actionId: quality-check
      name: Quality Check
    run:
      chat:
        backend: ollama
        model: llama3.2:3b
        role: user
        prompt: |
          You are a senior software engineer performing a code quality review.
          Analyse the {{ get('language') }} code below for maintainability issues.

          Focus on:
          • Readability and naming clarity (variables, functions, classes)
          • Cyclomatic complexity — functions that are too long or deeply nested
          • DRY violations (copy-paste code, magic literals)
          • Error and exception handling completeness
          • Missing or inadequate documentation / comments
          • Lack of unit test coverage indicators
          • Performance anti-patterns (N+1 queries, unbounded loops, etc.)
          • Language-specific best practices for {{ get('language') }}

          Code:
          ```{{ get('language') }}
          {{ get('code') }}
          ```

          Respond ONLY with a JSON object — no prose, no markdown fences:
          {
            "score": <integer 1-10, where 10 = excellent>,
            "suggestions": [
              { "category": "readability|complexity|dry|error-handling|docs|testing|performance|best-practice",
                "issue": "...",
                "location": "line N or function name",
                "recommendation": "..." }
            ],
            "summary": "One sentence overall quality assessment."
          }
        scenario:
          - role: assistant
            prompt: |
              You are a principal engineer who values clean, idiomatic, maintainable code.
              You ALWAYS respond with valid JSON and nothing else.
        jsonResponse: true
        jsonResponseKeys: [score, suggestions, summary]
        timeoutDuration: 120s

  # ── Return result to intake agent ─────────────────────────────────────────────
  - apiVersion: kdeps.io/v1
    kind: Resource
    metadata:
      actionId: quality-response
      name: Quality Response
      requires: [quality-check]
    run:
      apiResponse:
        success: true
        response: "{{ get('quality-check') }}"
