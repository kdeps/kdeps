apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: jinja2-expressions-demo
  description: "Demonstrates Jinja2 preprocessing in kdeps"
  version: "1.0.0"
  targetActionId: response



settings:
  apiServerMode: true
  apiServer:
    hostIp: "0.0.0.0"

    portNum: 16395

    routes:
      - path: /api/demo
        methods: [GET, POST]
    cors:
      allowOrigins:
        - "*"

  agentSettings:
    timezone: Etc/UTC