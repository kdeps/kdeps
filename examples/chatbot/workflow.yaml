apiVersion: kdeps.io/v1
kind: Workflow

metadata:
  name: chatbot
  description: Simple LLM chatbot on the ollama backend (explicit opt-in)
  version: "1.0.0"
  targetActionId: responseResource

settings:

  apiServer:
    portNum: 16395
    routes:
      - path: /api/v1/chat
        methods: [POST]
    cors:
      allowOrigins:
        - "*"

  agentSettings:
    timezone: Etc/UTC
    pythonVersion: "3.12"
    installOllama: true  # bake the ollama server into Docker/ISO builds
    env:
      KDEPS_DEFAULT_BACKEND: ollama  # pin ollama (default backend is "file"/llamafile)
