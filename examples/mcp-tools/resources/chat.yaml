actionId: chat
name: Chat with MCP Filesystem Tools

validations:
  routes: [/chat]
  methods: [POST]

chat:
  model: llama3.2:1b
  role: user
  prompt: "{{ input('message') }}"
  system: |
    You are a helpful assistant with access to filesystem tools via MCP.
    Use the read_file tool to read files and list_directory to explore directories.
    Only access paths the user explicitly requests.
  tools:
    - name: read_file
      description: "Read the contents of a file at the given path."
      mcp:
        server: npx
        args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
        transport: stdio
      parameters:
        path:
          type: string
          description: "Absolute path to the file to read."
          required: true

    - name: list_directory
      description: "List files and subdirectories in a directory."
      mcp:
        server: npx
        args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
        transport: stdio
      parameters:
        path:
          type: string
          description: "Absolute path to the directory to list."
          required: true

apiResponse:
  success: true
  response:
    reply: "{{ output('chat') }}"
