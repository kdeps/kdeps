apiVersion: kdeps.io/v1
kind: Component
metadata:
  name: browser
  description: Browser automation via Python playwright
  version: "1.0.0"
resources:
  - apiVersion: kdeps.io/v1
    kind: Resource
    metadata:
      actionId: browser-action
    run:
      python:
        script: |
          from playwright.sync_api import sync_playwright
          url = get("browserUrl")
          action = get("browserAction", "navigate")
          selector = get("browserSelector", "")
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto(url)
              if action == "screenshot":
                  path = get("browserScreenshotPath", "/tmp/screenshot.png")
                  page.screenshot(path=path)
                  set("browserResult", path)
              elif action == "getText":
                  if selector:
                      text = page.locator(selector).inner_text()
                  else:
                      text = page.content()
                  set("browserResult", text)
              else:
                  set("browserResult", page.url)
              browser.close()
