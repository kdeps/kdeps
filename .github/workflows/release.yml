name: Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-nightly*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    if: "!contains(github.ref_name, '-nightly')"
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      # Release binaries embed the committed llamafile registry
      # (refreshed and committed by the nightly workflow) for reproducible builds.
      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2

      - name: Get macOS SDK path
        id: macos_sdk
        run: echo "path=$(xcrun --show-sdk-path)" >> $GITHUB_OUTPUT

      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: latest
          args: release --clean
        env:
          SDK_PATH: ${{ steps.macos_sdk.outputs.path }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Trigger build-server redeploy
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          repository: kdeps/kdeps-io
          event-type: kdeps-release
          client-payload: '{"version": "${{ github.ref_name }}"}'
