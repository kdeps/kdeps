name: Build and Test

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.github/coverage-badge.json'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.github/coverage-badge.json'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          skip-dirs: docs/v2/node_modules,kdeps-io,kdeps-io.bak,private,.git
          skip-files: coverage.out,coverage-integration.out

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build kdeps binary
        run: make build
      - name: Build sample Docker image
        run: ./kdeps bundle build examples/webserver-static --tag kdeps-ci-scan:local
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: kdeps-ci-scan:local
          severity: CRITICAL,HIGH
          exit-code: 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Read golangci-lint version
        id: lint-version
        run: echo "version=$(cat .golangci-lint-version)" >> "$GITHUB_OUTPUT"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.lint-version.outputs.version }}
          args: --timeout=10m --config=.golangci.yml ./cmd/... ./pkg/... ./tests/...
          only-new-issues: false
      - name: govulncheck
        run: |
          set +e
          go tool govulncheck ./... > /tmp/govuln.txt 2>&1
          exit_code=$?
          set -e
          cat /tmp/govuln.txt
          if [ $exit_code -ne 0 ]; then
            # GO-2026-4887, GO-2026-4883: docker/docker daemon-side vulns, no fix available (v28.5.2 is latest)
            new_vulns=$(grep "^Vulnerability #" /tmp/govuln.txt | grep -v "GO-2026-4887\|GO-2026-4883" || true)
            if [ -n "$new_vulns" ]; then exit 1; fi
          fi

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      UV_NO_CACHE: 1
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'

    - name: Install uv
      run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama --version

    # We need golangci-lint installed because 'make test-unit' depends on 'lint'
    - name: Install golangci-lint
      run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin $(cat .golangci-lint-version)

    - name: Build
      run: make build

    - name: Start Ollama
      run: |
        ollama serve &
        sleep 5
        ollama pull tinydolphin

    - name: Test Unit
      run: make test-unit
      timeout-minutes: 15

    - name: Upload unit coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-out
        path: coverage.out
        retention-days: 1

    - name: Test Integration
      run: make test-integration
      timeout-minutes: 15

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: kdeps/kdeps
        files: coverage.out,coverage-integration.out
        fail_ci_if_error: false

    - name: Test E2E
      run: make test-e2e
      timeout-minutes: 15

  coverage-badge:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v4
        with:
          name: coverage-out
      - name: Update coverage badge
        run: |
          COV=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
          NUM=${COV%\%}
          if awk "BEGIN {exit !($NUM >= 100)}"; then COLOR=brightgreen
          elif awk "BEGIN {exit !($NUM >= 90)}"; then COLOR=green
          elif awk "BEGIN {exit !($NUM >= 80)}"; then COLOR=yellowgreen
          elif awk "BEGIN {exit !($NUM >= 70)}"; then COLOR=yellow
          else COLOR=orange
          fi
          printf '%s\n' "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COV}\",\"color\":\"${COLOR}\"}" > .github/coverage-badge.json
      - name: Commit coverage badge
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update coverage badge [skip ci]"
          file_pattern: .github/coverage-badge.json
